services:
    updater.get_updates:
        class: phpbb\update\get_updates
        arguments:
            - '@filesystem'
            - '%packages.public_key%'
            - '%core.root_path%'

    updater.controller:
        class: phpbb\update\controller
        arguments:
            - '@filesystem'
            - '@updater.get_updates'
            - '%core.root_path%'

    update.maintenance_generator:
        class: phpbb\update\maintenance_generator
        arguments:
            - '@config'
            - '@filesystem'
            - '@language.helper.language_file'
            - '@language.loader'
            - '@template'
            - '%core.root_path%'
            - '%core.php_ext%'
